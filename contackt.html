<div id="contackt_background">

  <div id="contackt_container">

    <form id="contact-form">

      <input
        type="text"
        name="from_name"
        placeholder="Your name"
        required
      >

      <input
        type="email"
        name="reply_to"
        placeholder="Your email"
        required
      >

      <textarea
        name="message"
        placeholder="Twoja wiadomość"
        required
      ></textarea>

      <button type="submit">
        Wyślij email
      </button>

    </form>

  </div>

</div>

<!-- EmailJS library -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<script>

(function(){
  emailjs.init("JVP4sBT2HRf9G4hFH");
})();

document
.getElementById("contact-form")
.addEventListener("submit", function(event){

  event.preventDefault();

  emailjs.sendForm(
    "service_f2kot8m",
    "template_qmvfkx9",
    this
  )
  .then(function(){

    alert("Email sent successfully!");

  }, function(error){

    alert("Failed to send email: " + error.text);

  });

});

</script>
