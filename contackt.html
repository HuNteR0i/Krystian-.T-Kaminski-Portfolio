<!DOCTYPE html>
<html lang="pl">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="contackt.css"/>
  <link rel="stylesheet" href="text.css"/>
  <link rel="stylesheet" href="global.css"/>
  <link rel="stylesheet" href="menu.css"/>
  <link rel="stylesheet" href="settings.css"/>
  <link rel="stylesheet" href="effect.css"/>
  <link rel="stylesheet" href="skill.css"/>
  <link rel="stylesheet" href="phone.css"/>
  <script src="test.js" defer></script> 
  <title>Contact</title>
</head>

<body>

<header class="head_foot">

  <div id="lang_butns">
    <button class="lang" id="btn_pl">PL</button>
    <button class="lang" id="btn_en">EN</button>
  </div>
  <button id="setting"></button>

</header>


<div id="contackt_background">

  <div id="contackt_container">

    <form id="contact-form">

      <input
        id="from_name"
        type="text"
        name="from_name"
        placeholder="Your name"
        data-text="your_name"
        required
      >

      <input
        id="reply_to"
        type="email"
        name="reply_to"
        placeholder="Your email"
        data-text="your_email"
        required
      >

      <textarea
        id="message"
        name="message"
        placeholder="Your message"
        data-text="your_message"
        required
      ></textarea>

      <button type="submit" id="send_button">
        submit
      </button>

    </form>

  </div>

</div>


<footer class="head_foot">

  <nav id="footer_menu">
      <p>&copy; Krystian T. Kaminski 2026</p>
      <p>CONTACT:</p>
      <p>Phone: 321908073</p>
  </nav>

</footer>


<!-- EmailJS library -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<script>

(function(){
  emailjs.init("JVP4sBT2HRf9G4hFH");
})();

document
.getElementById("contact-form")
.addEventListener("submit", function(event){

  event.preventDefault();

  emailjs.sendForm(
    "service_f2kot8m",
    "template_qmvfkx9",
    this
  )
  .then(function(){

    alert("Email sent successfully!");

  }, function(error){

    alert("Failed to send email: " + error.text);

  });

});

</script>

<script src="script.js"></script>
<script src="lang.js"></script>
<script src="contackt.js"></script>

</body>
</html>
